<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% بلاک عنوان %}بلنگ{% بلاک_ختم %} — اردو بلنگ سسٹم</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; direction: rtl; min-height: 100vh; }

    nav {
      background: #1a252f;
      padding: .85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    nav .brand { color: #f39c12; font-size: 1.25rem; font-weight: bold; text-decoration: none; }
    nav a { color: #bdc3c7; text-decoration: none; padding: .4rem .85rem; border-radius: 5px; font-size: .95rem; }
    nav a:hover, nav a.active { background: #2c3e50; color: #fff; }
    .nav-new { background: #27ae60 !important; color: #fff !important; margin-right: .5rem; }
    .nav-new:hover { background: #229954 !important; }

    .container { max-width: 980px; margin: 2rem auto; padding: 0 1.2rem; }

    h1 { margin-bottom: 1.5rem; color: #1a252f; font-size: 1.6rem; }
    h2 { color: #2c3e50; margin-bottom: 1rem; font-size: 1.25rem; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.75rem; }
    .stat { background: #fff; border-radius: 10px; padding: 1.25rem 1.5rem; box-shadow: 0 2px 10px rgba(0,0,0,.07); border-top: 4px solid #3498db; }
    .stat.green { border-color: #27ae60; }
    .stat.orange { border-color: #f39c12; }
    .stat.purple { border-color: #8e44ad; }
    .stat-label { font-size: .82rem; color: #888; margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .03em; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: #1a252f; }
    .stat-value.rupee::before { content: '₹'; font-size: 1.1rem; color: #555; vertical-align: super; margin-left: .15rem; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #f8f9fa; padding: .75rem 1rem; text-align: right; font-weight: 600; color: #555; border-bottom: 2px solid #e9ecef; font-size: .9rem; }
    tbody td { padding: .7rem 1rem; border-bottom: 1px solid #f0f0f0; font-size: .92rem; }
    tbody tr:hover td { background: #fafbfc; }
    tbody tr:last-child td { border-bottom: none; }

    /* Buttons */
    .btn { display: inline-block; padding: .45rem 1.1rem; border-radius: 6px; border: none; cursor: pointer; font-size: .9rem; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-secondary { background: #95a5a6; color: #fff; }
    .btn-sm { padding: .3rem .7rem; font-size: .82rem; }

    /* Badge */
    .badge { display: inline-block; padding: .22rem .65rem; border-radius: 20px; font-size: .78rem; font-weight: 700; }
    .badge-pending { background: #fef9e7; color: #e67e22; border: 1px solid #f39c12; }
    .badge-paid { background: #eafaf1; color: #27ae60; border: 1px solid #27ae60; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { display: block; font-weight: 600; color: #444; margin-bottom: .4rem; font-size: .92rem; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: .6rem .85rem;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: .95rem; direction: rtl; font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,.12); }
    .form-actions { display: flex; gap: .75rem; margin-top: 1.5rem; align-items: center; }

    /* Items table in invoice form */
    .items-header { background: #1a252f; color: #fff; }
    .items-header th { color: #ecf0f1; border-bottom: none; background: transparent; }
    .items-header th input { background: transparent; border: none; color: #ecf0f1; }
    .item-row td { padding: .5rem .6rem; }
    .item-row input { padding: .45rem .6rem; font-size: .9rem; }
    .total-section { text-align: left; margin-top: 1rem; }
    .total-amount { font-size: 1.4rem; font-weight: 700; color: #27ae60; }

    /* Invoice detail */
    .inv-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
    .inv-meta p { margin-bottom: .3rem; color: #555; font-size: .95rem; }
    .inv-meta strong { color: #222; }
    .inv-total-row td { font-weight: 700; font-size: 1.05rem; background: #f8f9fa; }

    .empty { text-align: center; padding: 3rem; color: #aaa; }
    .empty p { margin-bottom: 1rem; font-size: 1.05rem; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<nav>
  <a href="/" class="brand">اردو بلنگ</a>
  <div>
    <a href="/">ڈیش بورڈ</a>
    <a href="/customers">گاہکان</a>
    <a href="/invoices">بل</a>
    <a href="/invoices/new" class="nav-new btn btn-sm">+ نیا بل</a>
  </div>
</nav>
<div class="container">
  {% بلاک مواد %}{% بلاک_ختم %}

</body>
</html>
