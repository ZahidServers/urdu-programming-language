<!DOCTYPE html>
<html dir="rtl" lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% بلاک عنوان %}اردو حساب دان{% بلاک_ختم %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      direction: rtl;
      min-height: 100vh;
    }
    nav {
      background: #181825;
      padding: .75rem 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      border-bottom: 2px solid #cba6f7;
    }
    nav a {
      color: #cba6f7;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: .35rem .75rem;
      border-radius: 8px;
      transition: background .2s;
    }
    nav a:hover { background: #313244; }
    nav .عنوان { color: #cdd6f4; font-size: 1.15rem; font-weight: 700; margin-left: auto; }
    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    .کارڈ {
      background: #313244;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #cba6f7; }
    h2 { font-size: 1.15rem; margin-bottom: .75rem; color: #89b4fa; }
    input[type="text"], input[type="number"] {
      background: #1e1e2e;
      border: 1.5px solid #45475a;
      border-radius: 8px;
      color: #cdd6f4;
      padding: .6rem .9rem;
      font-size: 1rem;
      width: 100%;
      direction: ltr;
      text-align: right;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: #cba6f7; }
    .بٹن {
      display: inline-block;
      padding: .55rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }
    .بٹن:hover { opacity: .85; }
    .بٹن-اصلی { background: #cba6f7; color: #1e1e2e; }
    .بٹن-ثانوی { background: #45475a; color: #cdd6f4; }
    .بٹن-کامیاب { background: #a6e3a1; color: #1e1e2e; }
    .بٹن-خطرہ { background: #f38ba8; color: #1e1e2e; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .6rem .75rem; text-align: right; border-bottom: 1px solid #45475a; font-size: .92rem; }
    th { color: #89b4fa; font-weight: 600; background: #181825; }
    tr:hover td { background: #45475a22; }
    .صفحہ_بندی { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: 1rem; }
    .صفحہ_بندی a {
      padding: .35rem .75rem;
      border-radius: 6px;
      background: #45475a;
      color: #cdd6f4;
      text-decoration: none;
      font-size: .9rem;
    }
    .صفحہ_بندی a.فعال { background: #cba6f7; color: #1e1e2e; font-weight: 700; }
    .صفحہ_بندی a:hover { background: #585b70; }
    .خطا_متن { color: #f38ba8; }
    .کامیاب_متن { color: #a6e3a1; }
  </style>
</head>
<body>
<nav>
  <a href="/">حساب دان</a>
  <a href="/تاریخ/">تاریخ</a>
  <span class="عنوان">اردو حساب دان 🧮</span>
</nav>
<main>
  {% بلاک مواد %}{% بلاک_ختم %}
</main>
</body>
</html>
