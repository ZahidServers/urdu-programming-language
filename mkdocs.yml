site_name: اردو پروگرامنگ لینگویج — Urdu Programming Language
site_description: The world's first programming language written entirely in Urdu syntax.
site_author: Mohammed Zahid Wadiwale
site_url: https://urdu-programming-language.readthedocs.io/

repo_url: https://github.com/zahidwadiwale/urdu-programming-language
repo_name: urdu-programming-language

docs_dir: docs
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: Noto Naskh Arabic
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md

  - Syntax Reference:
    - Overview: syntax/index.md
    - Variables & Constants: syntax/01-variables.md
    - Data Types: syntax/02-data-types.md
    - Operators: syntax/03-operators.md
    - Strings: syntax/04-strings.md
    - Control Flow: syntax/05-control-flow.md
    - Functions: syntax/06-functions.md
    - Classes & OOP: syntax/07-classes.md
    - Async / Await: syntax/08-async.md
    - Error Handling: syntax/09-error-handling.md
    - Imports: syntax/10-imports.md

  - Built-ins:
    - Console: builtins/console.md
    - Math: builtins/math.md
    - Functions: builtins/functions.md
    - Types: builtins/types.md

  - Libraries:
    - Overview: libraries/index.md
    - Web (Flask / FastAPI / Django): libraries/web.md
    - Database: libraries/database.md
    - Cryptography: libraries/crypto.md
    - Files: libraries/files.md
    - HTTP / cURL: libraries/http.md
    - Web Scraping: libraries/scraper.md
    - Machine Learning: libraries/ml.md
    - Logging: libraries/logging.md
    - Date & Time: libraries/datetime.md
    - Threading: libraries/threading.md

  - Reference:
    - Keywords: reference/keywords.md
    - Operators: reference/operators.md

  - Examples:
    - Overview: examples/index.md
    - Hello World: examples/hello-world.md
    - Web Server: examples/web-server.md
    - FastAPI Socket Chat: examples/fastapi-socket-chat.md
    - Flask Blog: examples/flask-blog.md
    - Flask Billing: examples/flask-billing.md
    - Flask MySQL Books: examples/flask-mysql-books.md
    - Django Calculator: examples/django-calc.md
    - Data Analysis: examples/data-analysis.md
    - Web Scraping: examples/web-scraping.md
    - Diagnostic Scripts: examples/diagnostic-scripts.md

  - Building urdu.exe: building.md
  - Contributing: contributing.md
