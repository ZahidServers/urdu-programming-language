site_name: اردو پروگرامنگ لینگویج — Urdu Programming Language
site_description: The world's first programming language written entirely in Urdu syntax.
site_author: Mohammed Zahid Wadiwale
site_url: https://urdu-programming-language.readthedocs.io/

repo_url: https://github.com/ZahidServers/urdu-programming-language
repo_name: ZahidServers/urdu-programming-language

docs_dir: docs
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: Noto Naskh Arabic
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list

